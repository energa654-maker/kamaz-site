<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Лизинг КАМАЗ — условия и расчет</title>

  <link rel="stylesheet" href="/styles.css">
  <script src="/layout.js"></script>

  <style>
    /* PAGE */

body {
  background: #f4f8fc;
  color: #0f172a;
  font-family: Arial, sans-serif;
}

/* TITLE */

h1, h2, h3 {
  color: #0057b8;
}

/* TEXT */

p, li, span, label {
  color: #334155;
  line-height: 1.6;
}

/* FORM */

input,
textarea,
select {
  background: white;

  color: #0f172a;

  border: 1px solid #cbd5e1;

  padding: 14px;

  border-radius: 10px;
}

/* BUTTON */

button {
  background: #0057b8;

  color: #0f172a;

  border: none;

  padding: 14px 22px;

  border-radius: 10px;

  cursor: pointer;

  transition: 0.2s;
}

button:hover {
  background: #004799;
}

/* CARDS */

.card,
.form-box,
.block {
  background: white;

  border-radius: 18px;

  padding: 25px;

  box-shadow:
    0 10px 30px rgba(15,23,42,0.06);
}
  </style>
</head>

<body>

<script>renderHeader()</script>

<div class="hero">
  <h1>🚛 Лизинг КАМАЗ</h1>
  <p>Получите технику без полной оплаты — платите удобными ежемесячными платежами</p>
</div>

<div class="container">

  <!-- ПРЕИМУЩЕСТВА -->
  <div class="grid">

    <div class="box">
      <h3>💰 Без крупных вложений</h3>
      <p>Старт от 0% первоначального взноса</p>
    </div>

    <div class="box">
      <h3>📉 Налоговая выгода</h3>
      <p>Лизинговые платежи списываются в расходы</p>
    </div>

    <div class="box">
      <h3>🚚 Любая техника</h3>
      <p>Самосвалы, тягачи, спецтехника</p>
    </div>

  </div>

  <!-- КАЛЬКУЛЯТОР -->
  <div class="calc">

    <h2>📊 Калькулятор лизинга</h2>

    <input id="price" placeholder="Стоимость техники (₽)">
    <input id="percent" placeholder="Первоначальный взнос (%)">
    <input id="months" placeholder="Срок (мес)">

    <button class="btn" onclick="calcLease()">
      Рассчитать
    </button>

    <div class="result" id="result"></div>

  </div>

</div>

<script>
function calcLease() {
  const price = +document.getElementById('price').value;
  const percent = +document.getElementById('percent').value;
  const months = +document.getElementById('months').value;

  const down = price * (percent / 100);
  const monthly = (price - down) / months;

  document.getElementById('result').innerText =
    "Примерная ставка: " + monthly.toFixed(0) + " ₽ / мес";
}
</script>

<script>renderFooter()</script>

</body>
</html>
