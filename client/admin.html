<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Админка заявок — КАМАЗ</title>

<link rel="stylesheet" href="./styles.css">

<style>
.admin-page {
  max-width: 1300px;
  margin: auto;
  padding: 50px 20px;
}

.admin-title {
  color: #0057b8;
  font-size: 42px;
  margin-bottom: 10px;
}

.admin-subtitle {
  color: #64748b;
  margin-bottom: 30px;
}

.admin-panel {
  background: white;
  border: 1px solid #dbe7f5;
  border-radius: 24px;
  padding: 25px;
  box-shadow: 0 15px 40px rgba(15,23,42,0.06);
}

.admin-actions {
  display: flex;
  gap: 12px;
  margin-bottom: 25px;
  flex-wrap: wrap;
}

.admin-actions input {
  flex: 1;
  min-width: 250px;
  padding: 14px;
  border: 1px solid #cbd5e1;
  border-radius: 12px;
  font-size: 16px;
}

.admin-actions button {
  padding: 14px 22px;
  background: #0057b8;
  color: white;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
}

.leads-table {
  width: 100%;
  border-collapse: collapse;
}

.leads-table th,
.leads-table td {
  padding: 14px;
  border-bottom: 1px solid #e2e8f0;
  text-align: left;
  color: #0f172a;
  vertical-align: top;
}

.leads-table th {
  color: #0057b8;
  background: #f4f8fc;
}

.status {
  padding: 7px 12px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: bold;
}

.status-new {
  background: #e7f1ff;
  color: #0057b8;
}

.status-work {
  background: #fff7ed;
  color: #ea580c;
}

.status-done {
  background: #ecfdf5;
  color: #16a34a;
}

.action-btn {
  padding: 8px 12px;
  margin: 3px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

.work-btn {
  background: #f97316;
  color: white;
}

.done-btn {
  background: #16a34a;
  color: white;
}

.delete-btn {
  background: #dc2626;
  color: white;
}

.empty {
  text-align: center;
  padding: 30px;
  color: #64748b;
}

@media(max-width: 768px) {
  .leads-table {
    display: block;
    overflow-x: auto;
  }

  .admin-title {
    font-size: 32px;
  }
}
</style>
</head>

<body>

<header class="header">
  <div class="logo">🚛 КАМАЗ CRM</div>

  <nav class="nav">
    <a href="./index.html">Сайт</a>
    <a href="./admin.html">Заявки</a>
  </nav>
</header>

<div class="admin-page">

  <h1 class="admin-title">Админка заявок</h1>

  <p class="admin-subtitle">
    Здесь отображаются все заявки с сайта. Можно менять статус и удалять заявки.
  </p>

  <div class="admin-panel">

    <div class="admin-actions">
      <input id="searchInput" placeholder="Поиск по имени, телефону или комментарию">
      <button onclick="loadLeads()">Обновить</button>
    </div>

    <table class="leads-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Клиент</th>
          <th>Телефон</th>
          <th>Комментарий</th>
          <th>Статус</th>
          <th>Дата</th>
          <th>Действия</th>
        </tr>
      </thead>

      <tbody id="leadsBody">
        <tr>
          <td colspan="7" class="empty">Загрузка...</td>
        </tr>
      </tbody>
    </table>

  </div>

</div>

<script>
const API_URL = 'https://kamaz-site.onrender.com/api/leads';

let leads = [];

async function loadLeads() {
  const tbody = document.getElementById('leadsBody');

  tbody.innerHTML = `
    <tr>
      <td colspan="7" class="empty">Загрузка...</td>
    </tr>
  `;

  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    leads = data.data || [];

    renderLeads();

  } catch (error) {
    tbody.innerHTML = `
      <tr>
        <td colspan="7" class="empty">Ошибка загрузки заявок</td>
      </tr>
    `;
  }
}

function renderLeads() {
  const tbody = document.getElementById('leadsBody');
  const search = document.getElementById('searchInput').value.toLowerCase();

  const filtered = leads.filter(lead => {
    return (
      String(lead.name || '').toLowerCase().includes(search) ||
      String(lead.phone || '').toLowerCase().includes(search) ||
      String(lead.comment || '').toLowerCase().includes(search)
    );
  });

  if (filtered.length === 0) {
    tbody.innerHTML = `
      <tr>
        <td colspan="7" class="empty">Заявок нет</td>
      </tr>
    `;
    return;
  }

  tbody.innerHTML = filtered.map(lead => {
    const date = new Date(lead.created_at).toLocaleString('ru-RU');

    return `
      <tr>
        <td>${lead.id}</td>

        <td>${escapeHtml(lead.name)}</td>

        <td>
          <a href="tel:${escapeHtml(lead.phone)}">
            ${escapeHtml(lead.phone)}
          </a>
        </td>

        <td>${escapeHtml(lead.comment || '')}</td>

        <td>
          <span class="status ${getStatusClass(lead.status)}">
            ${getStatusText(lead.status)}
          </span>
        </td>

        <td>${date}</td>

        <td>
          <button class="action-btn work-btn" onclick="updateStatus(${lead.id}, 'work')">
            В работе
          </button>

          <button class="action-btn done-btn" onclick="updateStatus(${lead.id}, 'done')">
            Закрыта
          </button>

          <button class="action-btn delete-btn" onclick="deleteLead(${lead.id})">
            Удалить
          </button>
        </td>
      </tr>
    `;
  }).join('');
}

function getStatusClass(status) {
  if (status === 'work') return 'status-work';
  if (status === 'done') return 'status-done';
  return 'status-new';
}

function getStatusText(status) {
  if (status === 'work') return 'В работе';
  if (status === 'done') return 'Закрыта';
  return 'Новая';
}

async function updateStatus(id, status) {
  await fetch(`${API_URL}/${id}/status`, {
    method: 'PATCH',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ status })
  });

  await loadLeads();
}

async function deleteLead(id) {
  const ok = confirm('Удалить заявку?');

  if (!ok) return;

  await fetch(`${API_URL}/${id}`, {
    method: 'DELETE'
  });

  await loadLeads();
}

function escapeHtml(text) {
  return String(text)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

document.getElementById('searchInput').addEventListener('input', renderLeads);

loadLeads();
</script>

</body>
</html>
